name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          java-package: jdk

      - name: Add WiX Toolset to PATH
        shell: pwsh
        run: |
          $wix = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wix) {
            "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "WiX found at: $($wix.FullName)\bin"
          } else {
            Write-Error "WiX Toolset not found. jpackage --type exe requires WiX 3.x."
            exit 1
          }

      - name: Compile Java app
        shell: bash
        run: |
          mkdir -p build/classes
          javac -d build/classes HelloWorld.java
          mkdir -p build/libs
          jar cfe build/libs/HelloWorld.jar HelloWorld -C build/classes .

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="1.0.0"
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build Windows EXE installer
        shell: bash
        run: |
          mkdir -p dist
          jpackage \
            --type exe \
            --name HelloWorld \
            --app-version "${{ steps.version.outputs.value }}" \
            --vendor "dipakcode1710" \
            --description "Hello World Java Desktop App" \
            --input build/libs \
            --main-jar HelloWorld.jar \
            --main-class HelloWorld \
            --dest dist \
            --win-menu \
            --win-shortcut \
            --win-dir-chooser \
            --java-options "-Dfile.encoding=UTF-8"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HelloWorld-windows-exe-${{ steps.version.outputs.value }}
          path: dist/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: HelloWorld v${{ steps.version.outputs.value }}
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
